name: Build All Targets

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, develop, master]

jobs:
  check-trigger:
    name: Check Build Trigger
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Check if commit message starts with [run-build]
        id: check
        run: |
          message="${{ github.event.head_commit.message }}"
          if [[ "$message" == \[run-build\]* ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

  build-sdk:
    name: Build SDK
    runs-on: ubuntu-latest
    needs: check-trigger
    if: needs.check-trigger.outputs.should_build == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: "sdk/pnpm-lock.yaml"

      - name: Install dependencies
        working-directory: sdk
        run: pnpm install

      - name: Build SDK
        working-directory: sdk
        run: pnpm run build

      - name: Upload SDK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdk-dist
          path: sdk/dist/

  build-webapp:
    name: Build WebApp
    runs-on: ubuntu-latest
    needs: check-trigger
    if: needs.check-trigger.outputs.should_build == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: "webapp/pnpm-lock.yaml"

      - name: Install dependencies
        working-directory: webapp
        run: pnpm install

      - name: Build WebApp
        working-directory: webapp
        run: pnpm run build

      - name: Upload WebApp artifacts
        uses: actions/upload-artifact@v4
        with:
          name: webapp-dist
          path: webapp/dist/

  build-stager:
    name: Build ChattyStager
    runs-on: ubuntu-latest
    needs: check-trigger
    if: needs.check-trigger.outputs.should_build == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore NuGet packages
        working-directory: ChattyStager
        run: dotnet restore

      - name: Publish ChattyStager (Framework-Dependent)
        working-directory: ChattyStager
        run: dotnet publish -c Release --no-restore -o ./bin/Release/publish

      - name: Upload Stager artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stager-build
          path: ChattyStager/bin/Release/publish/

  build-app-apk:
    name: Build Expo APK
    runs-on: ubuntu-latest
    needs: check-trigger
    if: needs.check-trigger.outputs.should_build == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install app dependencies
        working-directory: app
        run: npm install

      - name: Read version from .VERSION
        id: version
        run: |
          VERSION=$(cat .VERSION | tr -d '\r\n' | xargs)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          # Generate versionCode: MAJOR * 10000 + MINOR * 100 + PATCH
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}, VersionCode: ${VERSION_CODE}"

      - name: Check Expo prebuild status
        working-directory: app
        run: |
          if [ ! -d "android" ]; then
            echo "Running Expo prebuild for Android..."
            npx expo prebuild --platform android --clean
          else
            echo "Android prebuilt directory found, skipping prebuild"
          fi

      - name: Inject version into Android build
        working-directory: app/android
        run: |
          sed -i "s/versionCode [0-9]*/versionCode ${{ steps.version.outputs.version_code }}/" app/build.gradle
          sed -i 's/versionName "[^"]*"/versionName "${{ steps.version.outputs.version }}"/' app/build.gradle
          echo "Injected versionName=${{ steps.version.outputs.version }} versionCode=${{ steps.version.outputs.version_code }}"

      - name: Build APK using Gradle
        working-directory: app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Find and upload APK
        run: |
          apk_path=$(find app/android -name "*.apk" -type f | grep -i release | head -1)
          if [ -f "$apk_path" ]; then
            cp "$apk_path" app/app-release.apk
          else
            echo "Error: APK not found"
            find app/android -name "*.apk" -type f
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: app/app-release.apk

  build-app-ipa:
    name: Build Expo IPA (Unsigned)
    runs-on: macos-latest
    needs: check-trigger
    if: needs.check-trigger.outputs.should_build == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install app dependencies
        working-directory: app
        run: npm install

      - name: Read version from .VERSION
        id: version
        run: |
          VERSION=$(cat .VERSION | tr -d '\r\n' | xargs)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          # Generate CFBundleVersion: MAJOR * 10000 + MINOR * 100 + PATCH
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          BUNDLE_VERSION=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "bundle_version=${BUNDLE_VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}, BundleVersion: ${BUNDLE_VERSION}"

      - name: Check Expo prebuild status
        working-directory: app
        run: |
          if [ ! -d "ios" ] || [ ! -d "android" ]; then
            echo "Running Expo prebuild..."
            npx expo prebuild --clean
          else
            echo "Prebuilt directories found, skipping prebuild"
          fi

      - name: Inject version into iOS build
        working-directory: app/ios
        run: |
          # Update CFBundleShortVersionString and CFBundleVersion in Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" \
            "$(find . -name 'Info.plist' -not -path '*/Pods/*' | head -1)"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.version.outputs.bundle_version }}" \
            "$(find . -name 'Info.plist' -not -path '*/Pods/*' | head -1)"
          echo "Injected CFBundleShortVersionString=${{ steps.version.outputs.version }} CFBundleVersion=${{ steps.version.outputs.bundle_version }}"

      - name: Install CocoaPods dependencies
        working-directory: app/ios
        run: pod install

      - name: Build iOS app (unsigned)
        working-directory: app/ios
        run: |
          # Get the Xcode project/workspace name
          project_name=$(ls -d *.xcodeproj 2>/dev/null | head -1 | sed 's/.xcodeproj//')
          workspace_name=$(ls -d *.xcworkspace 2>/dev/null | head -1)

          if [ -z "$workspace_name" ]; then
            echo "Using project: $project_name"
            xcodebuild clean -project "$project_name.xcodeproj" -scheme "$project_name"
            xcodebuild build \
              -project "$project_name.xcodeproj" \
              -scheme "$project_name" \
              -configuration Release \
              -derivedDataPath build \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO
            app_path="build/Build/Products/Release-iphoneos/$project_name.app"
          else
            echo "Using workspace: $workspace_name"
            project_name=$(echo "$workspace_name" | sed 's/.xcworkspace//')
            xcodebuild clean -workspace "$workspace_name" -scheme "$project_name"
            xcodebuild build \
              -workspace "$workspace_name" \
              -scheme "$project_name" \
              -configuration Release \
              -derivedDataPath build \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO
            app_path="build/Build/Products/Release-iphoneos/$project_name.app"
          fi

          # Verify the app was built
          if [ -d "$app_path" ]; then
            echo "App built successfully at: $app_path"
          else
            echo "Error: App not found at $app_path"
            find build -name "*.app" -type d
            exit 1
          fi

      - name: Package IPA
        working-directory: app/ios
        run: |
          app_path=$(find build/Build/Products/Release-iphoneos -name "*.app" -type d | head -1)
          mkdir -p Payload
          cp -r "$app_path" Payload/
          zip -r app.ipa Payload
          mv app.ipa ../app.ipa
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-ipa-unsigned
          path: app/app.ipa

  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    needs: [check-trigger, build-sdk]
    if: needs.check-trigger.outputs.should_build == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: "server/pnpm-lock.yaml"

      - name: Install dependencies
        working-directory: server
        run: pnpm install

      - name: Build Server
        working-directory: server
        run: pnpm run build

      - name: Install production dependencies only
        working-directory: server
        run: |
          rm -rf node_modules
          pnpm install --prod

      - name: Upload Server artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-dist
          path: |
            server/dist/
            server/node_modules/
            server/package.json
            server/chatty.server.config.js

  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs:
      [
        check-trigger,
        build-sdk,
        build-webapp,
        build-stager,
        build-app-apk,
        build-app-ipa,
        build-server,
      ]
    if: always() && needs.check-trigger.outputs.should_build == 'true'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: build-artifacts

      - name: List artifacts
        run: |
          echo "=== Build Artifacts Summary ==="
          find build-artifacts -type f -exec ls -lh {} \;

      - name: Display build status
        run: |
          echo "Build triggered by commit message: ${{ github.event.head_commit.message }}"
          echo "All builds completed!"

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      [
        check-trigger,
        build-sdk,
        build-webapp,
        build-stager,
        build-app-apk,
        build-app-ipa,
        build-server,
      ]
    if: |
      always() &&
      github.event_name == 'push' &&
      needs.check-trigger.outputs.should_build == 'true' &&
      (
        needs.build-sdk.result == 'success' ||
        needs.build-webapp.result == 'success' ||
        needs.build-stager.result == 'success' ||
        needs.build-app-apk.result == 'success' ||
        needs.build-app-ipa.result == 'success' ||
        needs.build-server.result == 'success'
      )
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
        continue-on-error: true

      - name: Package artifacts for release
        id: package
        run: |
          mkdir -p packages
          artifact_names=()

          # Artifacts that are single files (no need to re-zip): apk, ipa
          SINGLE_FILE_ARTIFACTS="app-apk app-ipa-unsigned"

          for dir in release-assets/*/; do
            name=$(basename "$dir")
            if [ -z "$(ls -A "$dir" 2>/dev/null)" ]; then
              echo "Skipping empty artifact: $name"
              continue
            fi

            # Count files in this artifact directory///
            file_count=$(find "$dir" -type f | wc -l)

            if echo "$SINGLE_FILE_ARTIFACTS" | grep -qw "$name" && [ "$file_count" -eq 1 ]; then
              # Single file artifact: copy directly without re-zipping
              src_file=$(find "$dir" -type f | head -1)
              ext="${src_file##*.}"
              dest="packages/${name}.${ext}"
              cp "$src_file" "$dest"
              echo "Single file: $name -> $dest"
            else
              # Multi-file artifact: package into zip
              zip_file="packages/${name}.zip"
              echo "Packaging $name ($file_count files) -> $zip_file"
              (cd "$dir" && zip -r "../../${zip_file}" .)
            fi
            artifact_names+=("$name")
          done

          if [ ${#artifact_names[@]} -eq 0 ]; then
            echo "No artifacts to publish."
            echo "has_artifacts=false" >> $GITHUB_OUTPUT
          else
            echo "Packaged ${#artifact_names[@]} artifacts: ${artifact_names[*]}"
            echo "has_artifacts=true" >> $GITHUB_OUTPUT
            echo "names=${artifact_names[*]}" >> $GITHUB_OUTPUT
          fi

          echo "=== Release files ==="
          ls -lh packages/

      - name: Generate release tag name
        id: tag
        if: steps.package.outputs.has_artifacts == 'true'
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="build-$(date +'%Y%m%d')-${SHORT_SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Release tag: ${TAG}"

      - name: Create GitHub Release
        id: create_release
        if: steps.package.outputs.has_artifacts == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Build ${{ steps.tag.outputs.tag }}"
          body: |
            Automated build from commit `${{ github.sha }}`

            **Commit message**: ${{ github.event.head_commit.message }}

            ### Build Results:
            - SDK: ${{ needs.build-sdk.result }}
            - WebApp: ${{ needs.build-webapp.result }}
            - ChattyStager: ${{ needs.build-stager.result }}
            - Android APK: ${{ needs.build-app-apk.result }}
            - iOS IPA: ${{ needs.build-app-ipa.result }}
            - Server: ${{ needs.build-server.result }}

            ### Attached artifacts:
            ${{ steps.package.outputs.names }}

            > Each artifact is packaged as a single .zip file. The failure of individual builds (e.g. iOS) is acceptable.
          files: |
            packages/*
          draft: false
          prerelease: false
          generate_release_notes: false
